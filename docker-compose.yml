# Postgres para desarrollo local del backend.
# Uso: docker compose up -d   →   Postgres en localhost:5466
services:
  postgres:
    image: postgres:16-alpine
    container_name: cafeteria-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafeteria
    ports:
      - "5466:5432"
    volumes:
      - cafeteria_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cafeteria_pg_data:
