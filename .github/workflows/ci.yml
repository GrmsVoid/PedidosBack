name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: "a-test-secret-of-32-chars-min-required-here"
      QR_SIGNING_SECRET: "another-test-secret-of-32-chars-min-required"
      APP_TIMEZONE: America/Lima
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm exec prisma generate
      - name: Type-check
        run: pnpm typecheck
      - name: Build bundle
        run: pnpm build
      # Integración/E2E usan Testcontainers (Docker disponible en ubuntu-latest).
      - name: Tests
        run: pnpm test
